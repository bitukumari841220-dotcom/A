<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireZone Admin - Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white font-sans">

    <!-- Sidebar/Header Design -->
    <header class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900 sticky top-0 z-50 shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="bg-orange-600 p-2 rounded-lg rotate-12 shadow-lg shadow-orange-600/30">
                <span class="text-xl font-black -rotate-12 block">FZ</span>
            </div>
            <h1 class="text-xl font-black tracking-tighter uppercase italic">Admin <span class="text-orange-500">Dashboard</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-[10px] bg-green-500/20 text-green-500 px-3 py-1 rounded-full font-black uppercase border border-green-500/20 animate-pulse">Live Server</span>
        </div>
    </header>

    <main class="p-6 max-w-5xl mx-auto">
        
        <!-- 1. Real-time Stats Cards -->
        <h2 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-4">Current Statistics</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-xl">
                <p class="text-[10px] text-gray-500 font-black uppercase">Total Players</p>
                <div class="flex justify-between items-end mt-2">
                    <h3 id="statUsers" class="text-3xl font-black">0</h3>
                    <i class="fa-solid fa-users text-slate-700 text-xl"></i>
                </div>
            </div>

            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-xl">
                <p class="text-[10px] text-gray-500 font-black uppercase">Pending Pay</p>
                <div class="flex justify-between items-end mt-2">
                    <h3 id="statPay" class="text-3xl font-black text-yellow-500">0</h3>
                    <i class="fa-solid fa-clock-rotate-left text-slate-700 text-xl"></i>
                </div>
            </div>

            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-xl">
                <p class="text-[10px] text-gray-500 font-black uppercase">Pending Withdraw</p>
                <div class="flex justify-between items-end mt-2">
                    <h3 id="statWithdraw" class="text-3xl font-black text-red-500">0</h3>
                    <i class="fa-solid fa-money-bill-transfer text-slate-700 text-xl"></i>
                </div>
            </div>

            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-xl">
                <p class="text-[10px] text-gray-500 font-black uppercase">Active Matches</p>
                <div class="flex justify-between items-end mt-2">
                    <h3 id="statMatches" class="text-3xl font-black text-blue-500">0</h3>
                    <i class="fa-solid fa-gamepad text-slate-700 text-xl"></i>
                </div>
            </div>

        </div>

        <!-- 2. Main Navigation Menu -->
        <h2 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-4">Quick Navigation</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
            
            <a href="admin-matches.html" class="bg-slate-800 p-8 rounded-[40px] border border-slate-700 flex flex-col items-center justify-center hover:bg-orange-600 transition-all shadow-xl group">
                <div class="bg-slate-900 w-16 h-16 rounded-3xl flex items-center justify-center mb-4 group-hover:bg-orange-500 shadow-inner">
                    <i class="fa-solid fa-plus text-2xl"></i>
                </div>
                <span class="font-black uppercase text-[10px] tracking-widest">Match Add/Delete</span>
            </a>

            <a href="admin-payments.html" class="bg-slate-800 p-8 rounded-[40px] border border-slate-700 flex flex-col items-center justify-center hover:bg-green-600 transition-all shadow-xl group">
                <div class="bg-slate-900 w-16 h-16 rounded-3xl flex items-center justify-center mb-4 group-hover:bg-green-500 shadow-inner">
                    <i class="fa-solid fa-receipt text-2xl"></i>
                </div>
                <span class="font-black uppercase text-[10px] tracking-widest text-center">Verify Deposit</span>
            </a>

            <a href="admin-withdrawals.html" class="bg-slate-800 p-8 rounded-[40px] border border-slate-700 flex flex-col items-center justify-center hover:bg-red-600 transition-all shadow-xl group">
                <div class="bg-slate-900 w-16 h-16 rounded-3xl flex items-center justify-center mb-4 group-hover:bg-red-500 shadow-inner">
                    <i class="fa-solid fa-hand-holding-dollar text-2xl"></i>
                </div>
                <span class="font-black uppercase text-[10px] tracking-widest">Withdrawals</span>
            </a>

            <a href="admin-users.html" class="bg-slate-800 p-8 rounded-[40px] border border-slate-700 flex flex-col items-center justify-center hover:bg-purple-600 transition-all shadow-xl group">
                <div class="bg-slate-900 w-16 h-16 rounded-3xl flex items-center justify-center mb-4 group-hover:bg-purple-500 shadow-inner">
                    <i class="fa-solid fa-user-gear text-2xl"></i>
                </div>
                <span class="font-black uppercase text-[10px] tracking-widest">Manage Users</span>
            </a>

            <a href="admin-notice.html" class="bg-slate-800 p-8 rounded-[40px] border border-slate-700 flex flex-col items-center justify-center hover:bg-yellow-600 transition-all shadow-xl group">
                <div class="bg-slate-900 w-16 h-16 rounded-3xl flex items-center justify-center mb-4 group-hover:bg-yellow-500 shadow-inner">
                    <i class="fa-solid fa-bullhorn text-2xl"></i>
                </div>
                <span class="font-black uppercase text-[10px] tracking-widest text-center">Global Notice</span>
            </a>

            <a href="admin-settings.html" class="col-span-2 md:col-span-3 bg-slate-800 p-8 rounded-[40px] border border-slate-700 flex items-center justify-center gap-6 hover:bg-indigo-600 transition-all shadow-xl group">
                <div class="bg-slate-900 w-16 h-16 rounded-3xl flex items-center justify-center group-hover:bg-indigo-500 shadow-inner">
                    <i class="fa-solid fa-screwdriver-wrench text-2xl"></i>
                </div>
                <span class="font-black uppercase text-xs tracking-[4px]">App Master Settings (Social & UPI)</span>
            </a>

        </div>

        <!-- Footer Info -->
        <p class="text-center text-[10px] text-gray-600 mt-12 font-black uppercase tracking-[5px]">FireZone Tournament Engine v1.0</p>
    </main>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC8NQ_bmJl-qRy0H_AzJ968bWwzhwMAsGw",
            authDomain: "firezone-a0a02.firebaseapp.com",
            projectId: "firezone-a0a02",
            storageBucket: "firezone-a0a02.firebasestorage.app",
            messagingSenderId: "1068854164782",
            appId: "1:1068854164782:web:8a627cdf687583debecebf"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Get Total Users (Real-time)
        db.collection("users").onSnapshot(snap => {
            document.getElementById('statUsers').innerText = snap.size;
        }, err => console.error("Users count error:", err));

        // 2. FIXED BUG: पेमेंट रिक्वेस्ट देखने के लिए सटीक कलेक्शन का उपयोग (payment_requests)
        db.collection("payment_requests").where("status", "==", "pending").onSnapshot(snap => {
            document.getElementById('statPay').innerText = snap.size;
        }, err => console.error("Payment count error:", err));

        // 3. FIXED BUG: विड्रॉ रिक्वेस्ट देखने के लिए सटीक कलेक्शन का उपयोग (withdraw_requests)
        db.collection("withdraw_requests").where("status", "==", "pending").onSnapshot(snap => {
            document.getElementById('statWithdraw').innerText = snap.size;
        }, err => console.error("Withdraw count error:", err));

        // 4. Get Active/Live Matches
        db.collection("matches").onSnapshot(snap => {
            document.getElementById('statMatches').innerText = snap.size;
        }, err => console.error("Matches count error:", err));
    </script>
</body>
</html>
