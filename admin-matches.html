<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Matches - FireZone Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Elements for Visuals -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-900 text-white p-4 pb-24">

    <div class="max-w-5xl mx-auto">
        <!-- Header & Filter -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-slate-800 p-4 rounded-3xl border border-slate-700">
            <h2 class="text-xl font-black text-orange-500 uppercase italic">Tournament Master</h2>
            <div class="flex items-center gap-2">
                <label class="text-[10px] font-bold text-gray-500 uppercase">Filter By Date:</label>
                <input type="date" id="filterDate" onchange="loadMatches()" class="bg-slate-900 p-2 rounded-xl border border-slate-700 text-xs outline-none text-orange-500">
                <a href="admin-dashboard.html" class="bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest">Dash</a>
            </div>
        </div>

        <!-- Add/Edit Form -->
        <div class="bg-slate-800 p-6 rounded-[40px] border border-slate-700 shadow-2xl mb-10">
            <h3 id="formTitle" class="text-xs font-black text-gray-500 uppercase mb-6 tracking-[4px] text-center">Add New Tournament</h3>
            <input type="hidden" id="editId">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="mTitle" placeholder="Match Title" class="bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none md:col-span-2">
                <select id="mCat" class="bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none">
                    <option value="Solo">Solo</option>
                    <option value="Duo">Duo</option>
                    <option value="Squad">Squad</option>
                </select>
                <input type="datetime-local" id="mTime" class="bg-slate-900 p-4 rounded-2xl border border-slate-700 text-gray-400 outline-none">
                <input type="number" id="mFee" placeholder="Entry Fee (₹)" class="bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none">
                <input type="number" id="mPrize" placeholder="Prize Pool (₹)" class="bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none">
                <input type="number" id="mKill" placeholder="Kill Prize (₹)" class="bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none">
                <input type="number" id="mSlots" placeholder="Total Slots / Max Users (e.g. 50)" class="bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none">
                <input type="text" id="mMap" placeholder="Map Name (e.g. Bermuda)" class="bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none md:col-span-2">
                <textarea id="mRules" placeholder="Game Rules" class="bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none md:col-span-3 h-20">No Hacks. No Team-up.</textarea>
            </div>
            <button onclick="saveMatch()" id="mainBtn" class="w-full bg-orange-600 hover:bg-orange-700 py-4 rounded-3xl font-black mt-6 shadow-xl shadow-orange-600/20 uppercase tracking-widest">Publish Tournament</button>
            <button id="cancelBtn" onclick="resetForm()" class="hidden w-full bg-slate-700 py-2 rounded-2xl mt-2 font-bold uppercase text-xs">Cancel Edit</button>
        </div>

        <!-- Matches Container -->
        <h3 class="text-[10px] font-black text-gray-500 uppercase mb-4 px-4 tracking-widest">Tournament List (All Data)</h3>
        <div id="matchContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Matches will load here -->
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC8NQ_bmJl-qRy0H_AzJ968bWwzhwMAsGw",
            authDomain: "firezone-a0a02.firebaseapp.com",
            projectId: "firezone-a0a02",
            storageBucket: "firezone-a0a02.firebasestorage.app",
            messagingSenderId: "1068854164782",
            appId: "1:1068854164782:web:8a627cdf687583debecebf"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 24 घंटे के फॉर्मेट (YYYY-MM-DDTHH:MM) को 12 घंटे AM/PM में बदलने का फंक्शन
        function formatTo12Hour(timeStr) {
            if (!timeStr) return "No Time Set";
            try {
                const dateObj = new Date(timeStr);
                if (isNaN(dateObj.getTime())) return timeStr.replace('T', ' '); // Fallback

                let hours = dateObj.getHours();
                const minutes = String(dateObj.getMinutes()).padStart(2, '0');
                const ampm = hours >= 12 ? 'PM' : 'AM';
                
                hours = hours % 12;
                hours = hours ? hours : 12; // 0 को 12 बनाने के लिए
                const displayHours = String(hours).padStart(2, '0');

                const day = String(dateObj.getDate()).padStart(2, '0');
                const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                const year = dateObj.getFullYear();

                return `📅 ${day}-${month}-${year} | ⏰ ${displayHours}:${minutes} ${ampm}`;
            } catch (e) {
                return timeStr.replace('T', ' ');
            }
        }

        function loadMatches() {
            const filter = document.getElementById('filterDate').value;
            db.collection("matches").onSnapshot(snap => {
                const container = document.getElementById('matchContainer');
                container.innerHTML = "";
                if(snap.empty) container.innerHTML = "<p class='col-span-full text-center py-10 italic text-gray-600'>No matches found.</p>";
                
                snap.forEach(doc => {
                    const m = doc.data();
                    const mTime = m.time || "";
                    if(filter && !mTime.includes(filter)) return;

                    // यूजर कोड के वेरिएबल्स के साथ पूरी तरह से सिंक किया गया
                    const displaySlots = m.totalSlots || m.maxPlayers || 0;
                    const displayKill = m.perKill || m.killPrize || 0;
                    const displayMap = m.map || "Bermuda";
                    
                    // AM/PM वाला टाइम फॉर्मेट तैयार किया
                    const formattedTime = formatTo12Hour(mTime);

                    container.innerHTML += `
                        <div class="bg-slate-800 p-6 rounded-[35px] border border-slate-700 shadow-xl border-t-4 border-t-orange-600">
                            <div class="flex justify-between items-start mb-4">
                                <h4 class="font-black text-white uppercase italic tracking-tighter truncate max-w-[70%]">${m.title || 'No Title'}</h4>
                                <div class="flex flex-col items-end gap-1">
                                    <span class="bg-slate-900 text-[9px] px-2.5 py-0.5 rounded-full font-bold uppercase border border-slate-700 text-orange-500">${m.category || 'Solo'}</span>
                                    <span class="text-[8px] uppercase tracking-wider text-gray-500 font-bold"><i class="fa-solid fa-map-location-dot"></i> ${displayMap}</span>
                                </div>
                            </div>
                            <p class="text-[10px] text-gray-400 font-bold mb-4">${formattedTime}</p>
                            <div class="grid grid-cols-2 gap-2 text-[10px] text-gray-400 font-black uppercase mb-6 bg-slate-900/50 p-4 rounded-2xl">
                                <p>Fee: <span class="text-white">₹${m.fee || 0}</span></p>
                                <p>Kill: <span class="text-white">₹${displayKill}</span></p>
                                <p>Prize: <span class="text-white">₹${m.prize || 0}</span></p>
                                <p>Total Slots: <span class="text-orange-500">${displaySlots} Users</span></p>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <a href="admin-match-control.html?id=${doc.id}" class="flex-1 bg-blue-600 text-center py-2 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center">Manage</a>
                                <button onclick="editMatch('${doc.id}')" class="bg-slate-700 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Edit</button>
                                <button onclick="deleteMatch('${doc.id}')" class="bg-red-600/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Del</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function saveMatch() {
            const id = document.getElementById('editId').value;
            
            // यूजर एंड ऐप कोड (totalSlots, perKill, map) के साथ 100% सिंक की गई डेटा ऑब्जेक्ट
            const data = {
                title: document.getElementById('mTitle').value,
                category: document.getElementById('mCat').value,
                time: document.getElementById('mTime').value,
                fee: document.getElementById('mFee').value,
                prize: document.getElementById('mPrize').value,
                killPrize: document.getElementById('mKill').value, // बैकवर्ड कम्पैटिबिलिटी
                perKill: document.getElementById('mKill').value,    // यूजर साइड मैचिंग
                maxPlayers: document.getElementById('mSlots').value, // बैकवर्ड कम्पैटिबिलिटी
                totalSlots: document.getElementById('mSlots').value, // यूजर साइड मैचिंग
                map: document.getElementById('mMap').value || "Bermuda",
                rules: document.getElementById('mRules').value,
                createdAt: new Date()
            };

            if(id) {
                db.collection("matches").doc(id).update(data).then(() => { alert("Tournament Updated Successfully!"); resetForm(); });
            } else {
                db.collection("matches").add(data).then(() => { alert("Tournament Published Successfully!"); resetForm(); });
            }
        }

        function editMatch(id) {
            db.collection("matches").doc(id).get().then(doc => {
                const m = doc.data();
                document.getElementById('editId').value = id;
                document.getElementById('mTitle').value = m.title || "";
                document.getElementById('mCat').value = m.category || "Solo";
                document.getElementById('mTime').value = m.time || "";
                document.getElementById('mFee').value = m.fee || "";
                document.getElementById('mPrize').value = m.prize || "";
                document.getElementById('mKill').value = m.perKill || m.killPrize || "";
                document.getElementById('mSlots').value = m.totalSlots || m.maxPlayers || "";
                document.getElementById('mMap').value = m.map || "Bermuda";
                document.getElementById('mRules').value = m.rules || "";
                
                document.getElementById('formTitle').innerText = "Edit Mode Active";
                document.getElementById('mainBtn').innerText = "Update Tournament";
                document.getElementById('cancelBtn').classList.remove('hidden');
            });
        }

        function resetForm() {
            document.getElementById('editId').value = "";
            document.getElementById('mTitle').value = "";
            document.getElementById('mFee').value = "";
            document.getElementById('mPrize').value = "";
            document.getElementById('mKill').value = "";
            document.getElementById('mSlots').value = "";
            document.getElementById('mMap').value = "";
            document.getElementById('mRules').value = "No Hacks. No Team-up.";
            document.getElementById('formTitle').innerText = "Add New Tournament";
            document.getElementById('mainBtn').innerText = "Publish Tournament";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        function deleteMatch(id) { if(confirm("Are you sure you want to delete this tournament?")) db.collection("matches").doc(id).delete(); }
        window.onload = loadMatches;
    </script>
</body>
</html>
